<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ม.1 เกมระบบสารสนเทศ - Interactive Game</title>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        
        #webcam {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -100; background-size: cover;
        }

        /* กล่องใหญ่ควบคุมแผนที่สื่อจาก Canva */
        #game-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; height: auto; z-index: 10;
        }

        #main-media {
            width: 100%; height: auto; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); display: block;
        }

        /* สร้างจุดล่องหนให้นักเรียนจิ้มตรงตำแหน่งไอคอนพอดี */
        .clickable-spot {
            position: absolute; border-radius: 50%; cursor: pointer;
            background: rgba(255, 255, 255, 0.1); /* สีจางๆ เพื่อให้รู้ว่ากดได้ */
            border: 2px dashed rgba(255, 255, 255, 0.4);
            animation: pulse 1.5s infinite;
        }

        /* ตำแหน่งปุ่มจิ้มแยกชิ้นตามภาพคุณครู */
        #spot-ram1 { width: 22%; height: 26%; top: 28%; left: 16%; }
        #spot-cpu { width: 22%; height: 26%; top: 28%; left: 62%; }
        #spot-ram2 { width: 22%; height: 26%; top: 58%; left: 39%; }

        /* หน้าต่างป๊อปอัปเฉลยความหมายเมื่อเด็กกดจิ้ม */
        #info-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 80%; max-width: 350px; background: white; padding: 25px;
            text-align: center; border-radius: 20px; z-index: 100;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #info-card.active { transform: translate(-50%, -50%) scale(1); }
        #info-title { color: #ff4757; font-size: 22px; margin-top: 0; }
        #info-text { color: #2f3542; font-size: 16px; line-height: 1.5; margin-bottom: 20px; }
        
        .close-btn {
            background: #2ed573; color: white; border: none; padding: 10px 25px;
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 14px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.08); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>

    <div id="game-container">
        <img id="main-media" src="hardware-info.png">
        
        <div id="spot-ram1" class="clickable-spot" onclick="showInfo('RAM (หน่วยความจำชั่วคราว)', 'ทำหน้าที่พักข้อมูลชั่วคราวเพื่อให้คอมพิวเตอร์ทำงานได้เร็วขึ้น ยิ่งมีเยอะ ยิ่งเปิดแอปได้พร้อมกันหลายๆ ตัวโดยไม่ค้าง!')"></div>
        <div id="spot-cpu" class="clickable-spot" onclick="showInfo('CPU (สมองคอมพิวเตอร์)', 'เป็นหน่วยประมวลผลกลาง เปรียบเหมือนสมองของคอมพิวเตอร์ คอยคิดคำนวณ และสั่งการอุปกรณ์ทุกอย่างให้ทำงานร่วมกันครับ')"></div>
        <div id="spot-ram2" class="clickable-spot" onclick="showInfo('RAM ตัวที่ 2', 'ข้อมูลส่วนความจำรองช่วยเสริมการประมวลผลหลัก ให้แอปพลิเคชันใหญ่ๆ ทำงานได้อย่างราบรื่นไม่มีสะดุด!')"></div>
    </div>

    <div id="info-card" id="popup">
        <h3 id="info-title">หัวข้อ</h3>
        <p id="info-text">เนื้อหาความหมาย...</p>
        <button class="close-btn" onclick="closeInfo()">👍 รับทราบ / ไปจิ้มอันอื่นต่อ</button>
    </div>

    <script>
        // บังคับขอสิทธิ์เปิดกล้องหลังมือถือ
        const video = document.getElementById('webcam');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) { video.srcObject = stream; })
            .catch(function(error) { console.log("Camera access error: ", error); });
        }

        // ระบบจิ้มสัมผัสแล้วเด้งหน้าต่างความรู้
        function showInfo(title, text) {
            document.getElementById('info-title').innerText = title;
            document.getElementById('info-text').innerText = text;
            document.getElementById('info-card').classList.add('active');
        }

        function closeInfo() {
            document.getElementById('info-card').classList.remove('active');
        }
    </script>
</body>
</html>
