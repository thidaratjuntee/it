<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ม.1 เกมระบบสารสนเทศ - Air Touch Responsive</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        #instruction {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #00ffcc; padding: 10px 20px;
            border-radius: 30px; font-size: 14px; font-weight: bold; z-index: 10;
            text-align: center; border: 2px solid #00ffcc; width: 85%; max-width: 400px;
        }

        #info-popup {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%) scale(0);
            width: 85%; max-width: 360px; background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 20; text-align: center; transition: 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #info-popup.active { transform: translateX(-50%) scale(1); }
        #info-title { color: #0056b3; margin: 0 0 8px 0; font-size: 18px; }
        #info-text { color: #333; font-size: 14px; line-height: 1.4; margin: 0; }
    </style>
</head>
<body>

    <div id="container">
        <div id="instruction">👆 ยื่นมือเข้าหากล้อง แล้วใช้ "ปลายนิ้วชี้" จิ้มกล่องในอากาศ!</div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>

        <div id="info-popup">
            <h3 id="info-title">อุปกรณ์</h3>
            <p id="info-text">ความหมาย...</p>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const popup = document.getElementById('info-popup');
        const pTitle = document.getElementById('info-title');
        const pText = document.getElementById('info-text');

        // ปรับระบบตำแหน่งแบบ % (อัตราส่วนต่อหน้าจอ) เพื่อให้ไอคอนกระจายตัวสวยงามบนมือถือทุกรุ่น ไม่ล้นขอบ
        // x_pct และ y_pct คือจุดเริ่มต้น (0-100% ของจอ) | w_pct และ h_pct คือขนาดกล่องปุ่ม
        const items = [
            { id: 'RAM 1', name: 'RAM ตัวที่ 1 (หน่วยความจำชั่วคราว)', text: 'ทำหน้าที่พักข้อมูลชั่วคราวเพื่อให้คอมพิวเตอร์ทำงานได้เร็วขึ้น ยิ่งมีเยอะ ยิ่งเปิดแอปได้พร้อมกันหลายๆ ตัวโดยไม่ค้าง!', x_pct: 15, y_pct: 25, w_pct: 32, h_pct: 10, color: '#0052D4' },
            { id: 'CPU', name: 'CPU (สมองคอมพิวเตอร์)', text: 'หน่วยประมวลผลกลาง ทำหน้าที่คิดคำนวณและควบคุมการทำงานของระบบทั้งหมด เปรียบเหมือนสมองของคอมพิวเตอร์เลยครับ!', x_pct: 53, y_pct: 25, w_pct: 32, h_pct: 10, color: '#FF416C' },
            { id: 'RAM 2', name: 'RAM ตัวที่ 2 (หน่วยความจำรอง)', text: 'ช่วยเสริมการประมวลผลร่วมกับหน่วยความจำหลัก ช่วยให้โปรเจกต์หรือแอปพลิเคชันที่มีขนาดใหญ่ทำงานได้ราบรื่นไม่มีสะดุด!', x_pct: 34, y_pct: 42, w_pct: 32, h_pct: 10, color: '#757F9A' }
        ];

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            const screenW = canvasElement.width;
            const screenH = canvasElement.height;

            // วาดไอคอนแบบ Responsive ตามขนาดหน้าจอจริงของโทรศัพท์ครู
            items.forEach(item => {
                // แปลงค่า % เป็นพิกัดพิกเซลจริงบนหน้าจอขณะนั้น
                const realX = (item.x_pct / 100) * screenW;
                const realY = (item.y_pct / 100) * screenH;
                const realW = (item.w_pct / 100) * screenW;
                const realH = (item.h_pct / 100) * screenH;

                canvasCtx.fillStyle = item.color;
                canvasCtx.beginPath();
                canvasCtx.roundRect(realX, realY, realW, realH, 12);
                canvasCtx.fill();
                
                canvasCtx.fillStyle = '#ffffff';
                canvasCtx.font = 'bold 15px sans-serif';
                canvasCtx.textAlign = 'center';
                canvasCtx.textBaseline = 'middle';
                canvasCtx.fillText(item.id, realX + (realW / 2), realY + (realH / 2));
            });

            let anyHover = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    const indexTip = landmarks[8]; 
                    const x = (1 - indexTip.x) * screenW;
                    const y = indexTip.y * screenH;

                    // วาดจุดโฟกัสสีเขียวนีออนที่ปลายกระดูกนิ้วชี้
                    canvasCtx.fillStyle = '#00ffcc';
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 10, 0, 2 * Math.PI);
                    canvasCtx.fill();

                    // ตรวจจับการชนกันในอากาศแบบอิงตามเปอร์เซ็นต์จอ
                    items.forEach(item => {
                        const realX = (item.x_pct / 100) * screenW;
                        const realY = (item.y_pct / 100) * screenH;
                        const realW = (item.w_pct / 100) * screenW;
                        const realH = (item.h_pct / 100) * screenH;

                        if (x > realX && x < realX + realW && y > realY && y < realY + realH) {
                            pTitle.innerText = item.name;
                            pText.innerText = item.text;
                            popup.classList.add('active');
                            anyHover = true;

                            canvasCtx.strokeStyle = '#00ffcc';
                            canvasCtx.lineWidth = 3;
                            canvasCtx.strokeRect(realX - 2, realY - 2, realW + 4, realH + 4);
                        }
                    });
                }
            }

            if (!anyHover) {
                popup.classList.remove('active');
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 480,
            height: 640
        });
        camera.start();
    </script>
</body>
</html>
