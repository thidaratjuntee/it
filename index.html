<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ม.1 WebAR - Air Touch Game</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-hand-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #instruction {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); color: #00ffcc; padding: 12px 24px;
            border-radius: 20px; font-family: sans-serif; font-size: 16px; z-index: 999;
            text-align: center; border: 2px solid #00ffcc; width: 85%;
        }
    </style>
</head>
<body>

    <div id="instruction">👆 ยื่นมือเข้าหากล้อง แล้วใช้ "ปลายนิ้วชี้" ชี้ไปที่ไอคอนเพื่อดูความหมาย!</div>

    <a-scene mindar-hand="filterMinCF:0.001; filterBeta: 15" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera active="true" position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-hand-target="targetIndex: 0">
            <a-image src="hardware-info.png" position="0 0 0" scale="1 0.5 1"></a-image>
        </a-entity>
        
        <a-entity mindar-hand-target="targetIndex: 8">
            <a-text value="RAM & CPU: Hardware!" position="0 0.2 0" scale="0.4 0.4 0.4" color="#ff007f" align="center" font="kelsonsans"></a-text>
        </a-entity>
        
    </a-scene>

</body>
</html>
