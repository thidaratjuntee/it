<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ม.1 ระบบสารสนเทศ - Hand Tracking AR</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-hand-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        /* ใส่ข้อความแนะนำผู้เรียน */
        #instruction {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
            border-radius: 20px; font-family: sans-serif; font-size: 14px; z-index: 999;
        }
    </style>
</head>
<body>

    <div id="instruction">👋 แบมือส่องเข้าหากล้อง เพื่อดูสื่อ Hardware จาก Canva!</div>

    <a-scene mindar-hand="filterMinCF:0.001; filterBeta: 15" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera active="false" position="0 0 0"></a-camera>
        
        <a-entity mindar-hand-target="targetIndex: 0">
            <a-image src="hardware-info.png" position="0 0 0" rotation="0 0 0" scale="0.4 0.4 0.4"></a-image>
        </a-entity>
        
    </a-scene>

</body>
</html>
