<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Image Tracking - Hardware Info</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        /* จัดการ UI และซ่อนตัวโหลดที่หน้าจอตอนเริ่มต้น */
        .arjs-loader {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .arjs-loader div {
            text-align: center;
            color: white;
            font-family: sans-serif;
            font-size: 1.25em;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <div class="arjs-loader">
        <div>กำลังโหลดข้อมูลโปรแกรมจับภาพ (Marker)... กรุณารอสักครู่</div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true;"
        embedded
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <img id="info-card" src="hardware-info.png">
        </a-assets>

        <a-nft
            type="nft"
            url="./hardware-marker" 
            smooth="true"
            smoothCount="10"
            smoothTolerance=".01"
            smoothThreshold="5">
            
            <a-image 
                src="#info-card"
                position="100 0 -150" 
                rotation="-90 0 0"
                width="150"
                height="150">
            </a-image>

        </a-nft>

        <a-entity camera></a-entity>
    </scene>
</body>
</html>
